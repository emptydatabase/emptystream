<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}emptystream{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
</head>
<body>
    <header>
        <div class="container">
            <a href="{{ url_for('index') }}">emptystream</a>
            <form class="search-form" action="{{ url_for('search') }}" method="get">
                <div class="search-bar">
                    <div class="service-select">
                        <select name="service">
                            {% for key, label in services.items() %}
                            <option value="{{ key }}" {{ 'selected' if current_service == key }}>{{ label }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <select name="category" class="category-select hidden">
                        <option value="" {{ 'selected' if category is defined and (not category or category == '0_0') }}>All Categories</option>
                        {% for group_label, items in category_groups.items() %}
                        <optgroup label="{{ group_label }}">
                            {% for value, label in items.items() %}
                            <option value="{{ value }}" {{ 'selected' if category is defined and category == value }}>{{ label }}</option>
                            {% endfor %}
                        </optgroup>
                        {% endfor %}
                    </select>
                    <input type="text" name="q" placeholder="Search..." value="{{ query if query is defined else '' }}">
                </div>
                <button type="submit">Search</button>
            </form>
        </div>
    </header>
    <main class="container">
        {% block content %}{% endblock %}
    </main>
    <footer class="footer">
        <a href="https://github.com/emptydatabase/emptystream" target="_blank" rel="noopener noreferrer">
            Source code on GitHub
        </a>
    </footer>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var serviceSelect = document.querySelector('.service-select select');
            var categorySelect = document.querySelector('.category-select');
            function toggleCategory() {
                if (serviceSelect.value === 'nyaa') {
                    categorySelect.classList.remove('hidden');
                } else {
                    categorySelect.classList.add('hidden');
                }
            }
            serviceSelect.addEventListener('change', toggleCategory);
            toggleCategory();
        });
    </script>
</body>
</html>
